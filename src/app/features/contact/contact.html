<section class="section">
  <div class="container" *ngIf="profile">
    <app-section-header title="Get In Touch"
      subtitle="Open to new opportunities and collaborations"></app-section-header>

    <div class="row justify-content-center mt-5" data-aos="fade-up">
      <div class="col-lg-8">
        <div class="glass-card p-5 text-center contact-card">
          <div class="mb-4">
            <h3 class="h4 fw-bold mb-3">Let's build something amazing together!</h3>
            <p class="text-secondary">I’m currently open to new opportunities. Whether it's a project, a job offer, or
              just a technical discussion, I'd love to hear from you.</p>
          </div>

          <a [href]="'mailto:' + profile.email"
            class="btn btn-primary btn-glow btn-lg rounded-pill px-5 py-3 fw-bold my-4">
            <i class="bi bi-envelope me-2"></i> Say Hello
          </a>

          <div class="social-links-large d-flex justify-content-center gap-4 mt-4">
            <a [href]="profile.linkedin" target="_blank" class="social-icon rounded-circle" aria-label="LinkedIn">
              <i class="bi bi-linkedin fs-4"></i>
            </a>
            <a [href]="'tel:' + profile.phone" class="social-icon rounded-circle" aria-label="Phone">
              <i class="bi bi-telephone-fill fs-4"></i>
            </a>
          </div>

          <div class="mt-5 text-secondary">
            <p class="mb-1"><i class="bi bi-geo-alt me-2"></i>{{ profile.location }}</p>
            <!-- <p class="mb-0"><i class="bi bi-telephone ms-1 me-2"></i>{{ profile.phone }}</p> -->
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
