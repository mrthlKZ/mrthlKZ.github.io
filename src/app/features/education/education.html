<section class="section">
  <div class="container">
    <app-section-header title="Education" subtitle="My academic background"></app-section-header>
    
    <div class="row justify-content-center mt-5">
      <div class="col-lg-8">
        <div class="education-timeline ps-4 border-start border-2 border-primary border-opacity-25" data-aos="fade-up">
          @for (edu of education; track edu.degree) {
            <div class="education-item position-relative mb-5 ps-4">
              <div class="edu-marker position-absolute rounded-circle bg-primary"></div>
              <div class="glass-card p-4">
                <div class="d-flex flex-column flex-sm-row justify-content-between align-items-sm-center mb-2">
                  <h3 class="h5 fw-bold text-gradient mb-2 mb-sm-0">{{ edu.degree }}</h3>
                  <span class="badge bg-secondary bg-opacity-10 text-secondary border border-secondary border-opacity-25 rounded-pill px-3 py-1">
                    <i class="bi bi-calendar3 me-2"></i>{{ edu.duration }}
                  </span>
                </div>
                <h4 class="h6 text-secondary mb-0"><i class="bi bi-bank me-2"></i>{{ edu.institution }}</h4>
              </div>
            </div>
          }
        </div>
      </div>
    </div>
  </div>
</section>
